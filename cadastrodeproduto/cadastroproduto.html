<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produto</title>
         <link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">


    <link rel="stylesheet" href="styleproduto.css">
</head>

<body>

<!-- HEADER -->
<header class="topo">
  <img class="img" src="img/Logo do Gestor Fácil.png" alt="Logo do sistema">
  <h1 style="margin-top: 30px;">Cadastro de Produto</h1>
  <span class="span">Usuário | Sair</span>
</header>

<!-- CONTEÚDO -->
<main class="conteudo">

  <div class="form-container">

    <h2>Novo Produto</h2>

    <form>

      <label>Nome do Produto</label>
      <input id="nome" type="text" placeholder="Digite o nome do produto">

      <label>Código</label>
      <input id="codigo" type="text" placeholder="Digite o código do produto">

      <label>Data de Entrada</label>
      <input id="data" type="date">

      <label>Quantidade em Estoque</label>
      <input id="estoque" type="number" placeholder="Quantidade">

      <label>Preço</label>
      <input id="preco" type="text" placeholder="R$ 0,00">

      <label>Cores Disponíveis</label>
      <input id="cores" type="text" placeholder="Ex: Azul, Vermelho...">

      <label>Imagem do Produto</label>
      <input type="file">

      <div class="botoes">
        <button type="submit" class="salvar">Salvar
          <span class="material-symbols-outlined">save</span>
        </button>

        <button type="button" class="cancelar">Cancelar 
        <span class="material-symbols-outlined">cancel</span>
        </button>
      </div>

    </form>

  </div>

</main>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  let produto = {
    nome: document.getElementById("nome").value,
    codigo: document.getElementById("codigo").value,
    data: document.getElementById("data").value,
    estoque: document.getElementById("estoque").value,
    preco: document.getElementById("preco").value,
    cores: document.getElementById("cores").value
  };

  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  produtos.push(produto);

  localStorage.setItem("produtos", JSON.stringify(produtos));

  alert("Produto cadastrado com sucesso!");

  window.location.href = "index.html";
});
</script>
</body>
</html>
